<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blocked by Anchor</title>
    <!-- Design-system vanilla binding (AF3, #164). The student-facing surfaces
         render on the DS ink treatment (ANCHOR_BRAND.md §3), so the page wears
         `.plink-ink` and composes from `.pl-*` classes + DS tokens. plink.css
         is vendored verbatim (src/vendor/plink-design-system) and copied to
         dist/vendor by rollup; its `../assets/fonts/…` paths resolve from
         there. The only Anchor-specific bits below are the per-product accent
         (--product-accent) and block-page chrome built from DS tokens. -->
    <link rel="stylesheet" href="vendor/plink-design-system/dist/plink.css" />
    <style>
      /* Block-page chrome — composed from DS tokens (custom properties defined
         by plink.css). No brand colours are redefined here; the only token this
         surface sets is its one per-product accent. */
      .block-root {
        /* Anchor's reserved accent on ink (ANCHOR_BRAND.md §2). Reserved for
           the identity rule only — magenta stays the spark. */
        --product-accent: #7e80d2;
        min-height: 100vh;
        margin: 0;
        font-family: var(--font-body);
        line-height: var(--body-lh);
        display: grid;
        place-items: center;
        padding: var(--space-6) var(--space-5);
        box-sizing: border-box;
      }
      .card { max-width: 560px; width: 100%; }
      .card > * + * { margin-top: var(--space-3); }
      h1 {
        font-family: var(--font-display);
        font-weight: var(--body-weight-strong);
        font-size: var(--display-3);
        line-height: var(--display-3-lh);
        letter-spacing: var(--display-tracking);
        margin: var(--space-4) 0 0;
      }
      p { margin: 0; }
      p.muted { color: var(--text-muted); }
      .blocked-url {
        word-break: break-all;
        font-family: var(--font-mono);
        font-size: var(--text-sm);
        background: var(--surface-inset);
        border: var(--border-width) solid var(--border);
        padding: var(--space-2) var(--space-3);
        border-radius: var(--radius);
      }
      .actions {
        display: flex;
        gap: var(--space-3);
        flex-wrap: wrap;
        margin-top: var(--space-5);
      }
      .status {
        margin-top: var(--space-4);
        font-family: var(--font-mono);
        font-size: var(--text-sm);
        letter-spacing: var(--label-tracking-tight);
        min-height: 1.4em;
        color: var(--text-muted);
      }
      /* No error token in the system palette; keep a legible on-ink red. */
      .status.error { color: #f87171; }
      .footnote {
        margin-top: var(--space-5);
        font-family: var(--font-mono);
        font-size: var(--label-sm);
        letter-spacing: var(--label-tracking-tight);
        text-transform: uppercase;
        color: var(--text-caption);
      }
    </style>
  </head>
  <body class="plink-ink block-root">
    <!-- The one per-product identity element, in Anchor's accent. -->
    <div class="pl-identity-rule" aria-hidden="true"></div>
    <main class="pl-card card">
      <p class="pl-eyebrow pl-eyebrow--on-ink">
        <span class="pl-eyebrow__dot"></span>Focus session
      </p>
      <h1>This site isn't allowed right now</h1>
      <p>You're in an active focus session<span data-session-suffix></span>. The page you tried to open isn't on its allowlist.</p>
      <div class="blocked-url" data-blocked-url>—</div>
      <p class="muted">If you think this site should be allowed for this session, ask your teacher — they can add it from the dashboard.</p>
      <div class="actions">
        <button class="pl-btn pl-btn--primary" type="button" data-action="back">Go back</button>
        <button class="pl-btn pl-btn--outline" type="button" data-action="request">Request access</button>
      </div>
      <output class="status" data-status aria-live="polite"></output>
      <p class="footnote">Anchor focus enforcement</p>
    </main>
    <script src="block-page.js"></script>
  </body>
</html>
