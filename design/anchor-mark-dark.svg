<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56" role="img" aria-label="Anchor mark">
  <!-- Anchor mark — dark (on ink #1B1B23). Accent on ink: indigo #7E80D2.
       Built from the Plink ping: the open ring is the anchor's shackle. -->
  <g fill="none" stroke="#7E80D2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- shackle = the open ping ring -->
    <circle cx="28" cy="13" r="7"/>
    <!-- ping centre / shackle pin -->
    <circle cx="28" cy="13" r="1.6" fill="#7E80D2" stroke="none"/>
    <!-- stock (crossbar) -->
    <line x1="17" y1="24" x2="39" y2="24"/>
    <!-- stem -->
    <line x1="28" y1="20" x2="28" y2="46"/>
    <!-- crown / arms — the calm fluke arc -->
    <path d="M12 38 Q28 54 44 38"/>
    <!-- fluke tips -->
    <path d="M12 38 L9.5 33"/>
    <path d="M44 38 L46.5 33"/>
  </g>
</svg>
