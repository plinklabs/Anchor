name: Backend Deploy

# Publish the API and deploy it to Azure App Service.
#
# This runs ONLY after the "Backend CI" workflow completes successfully on
# `main` — `workflow_run` chains the two so the deploy is gated on build + test
# passing (the issue's "gate the deploy on backend CI success"). Backend CI is
# itself path-filtered to `backend/**`, so a push that doesn't touch the backend
# never starts this chain. We re-assert the success + branch conditions in the
# job `if` because `workflow_run` fires for every conclusion (success, failure,
# cancelled) and for any head branch.
#
# Auth uses a publish-profile secret (AZURE_WEBAPP_PUBLISH_PROFILE). Migrating to
# OIDC federated credentials is a later hardening upgrade (see docs/RELEASE.md).
# The target App Service name comes from the AZURE_WEBAPP_NAME repo Actions
# variable so a fork deploys to its own `anchor-api-<school>` resource with no
# source edits, mirroring the dashboard-deploy convention (#202).

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-deploy:
    # Only on a successful Backend CI run for main. workflow_run also fires on
    # failure/cancellation and (defensively) we pin the branch here too.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >-
          dotnet publish src/Anchor.Api/Anchor.Api.csproj
          --configuration Release
          --output ${{ runner.temp }}/publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ runner.temp }}/publish
