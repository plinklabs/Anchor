name: Dashboard E2E

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard-e2e.yml'
  pull_request:
    paths:
      - 'dashboard/**'
      - '.github/workflows/dashboard-e2e.yml'

concurrency:
  group: dashboard-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Dashboard E2E
    # Linux runner: the dashboard is Flutter Web, and the GitHub-hosted ubuntu
    # image ships Google Chrome + a matching chromedriver (under $CHROMEWEBDRIVER),
    # which is all `flutter drive` needs for a real-browser run. No backend: the
    # dashboard is MSAL-only and can't be dev-impersonated, so the suite boots the
    # real app against fake APIs + a stubbed SignalR feed (#132).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'

      - name: Install dependencies
        run: flutter pub get

      # Boots AnchorDashboard in headless Chrome and drives the live-session view:
      # a SignalR roster transition, an unblock-request push, a UI bundle PUT, and
      # the event feed. chromedriver is started in-step so it outlives into the
      # drive; $CHROMEWEBDRIVER is preset on the GitHub-hosted ubuntu image.
      - name: Run live-session e2e (web, headless Chrome)
        run: |
          "$CHROMEWEBDRIVER/chromedriver" --port=4444 &
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/live_session_test.dart \
            -d web-server \
            --browser-name=chrome \
            --headless

      # Boots the real app and drives Home → History → open a past session,
      # asserting the archive reads in the muted paper register (AD7, #172).
      # A fresh `flutter drive` reuses the chromedriver started above.
      - name: Run history-archive e2e (web, headless Chrome)
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/history_archive_test.dart \
            -d web-server \
            --browser-name=chrome \
            --headless

      # Boots the real app as a teacher whose Teacher role isn't provisioned yet
      # and walks Home → Classes → History, asserting each 403 surfaces the calm
      # not-authorized notice rather than a raw `ApiException(403):` (#278).
      - name: Run graceful-403 e2e (web, headless Chrome)
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/graceful_403_test.dart \
            -d web-server \
            --browser-name=chrome \
            --headless

      # Boots the real app as an admin and drives the Admin → Admins sub-tab:
      # search a signed-in user, promote them, then remove an admin (#300).
      - name: Run manage-admins e2e (web, headless Chrome)
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/manage_admins_test.dart \
            -d web-server \
            --browser-name=chrome \
            --headless

      # Boots the real app as an admin and drives the Admin → Schools sub-tab:
      # render the schools list and deactivate one via its toggle (#301).
      - name: Run manage-schools e2e (web, headless Chrome)
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/manage_schools_test.dart \
            -d web-server \
            --browser-name=chrome \
            --headless
